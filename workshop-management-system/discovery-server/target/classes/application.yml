server:
  port: 8761

spring:
  application:
    name: discovery-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0   # capture all requests (for learning)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
